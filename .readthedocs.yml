version: 2

# Build documentation in the docs/ directory with Sphinx
build:
  os: ubuntu-22.04
  tools:
    python: "3.9"

# Sphinx configuration
sphinx:
  configuration: docs/source/conf.py

# Python dependencies
python:
  install:
    - requirements: docs/requirements-docs.txt

# Optional: Enable PDF builds
# formats:
#   - pdf
