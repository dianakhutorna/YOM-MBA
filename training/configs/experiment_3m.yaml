# Experiment: Train on 3 months of data, evaluate on held-out test set
experiment_name: "train_3m"

raw_paths:
  - training/data/raw/train_df_3m.csv
test_raw_path: training/data/raw/test_df_1m.csv

n_rows: 0  # 0 = load all rows (no sampling)
sample_position: head
interim_path: training/data/interim/experiment_3m_orders.parquet
products_path: training/data/external/products_v2.csv
commerces_path: training/data/external/commerces.csv
model_path: training/models/experiment_3m_lgbm_ranker.txt

train_ratio: 0.85
val_ratio: 0.15
train_label_ratio: 0.3

min_cooc: 2
min_lift: 1.2
top_k: 100
top_k_train: 100
label_window_days: 7
min_cooc_label: 1
label_kiosk_batch_size: 0
max_neg_per_group: 20
max_eval_queries: 50000
eval_ks: [5, 10, 20, 50]
predict_batch_size: 200000

lgbm_params:
  learning_rate: 0.02
  num_leaves: 15
  max_depth: 5
  min_data_in_leaf: 1000
  min_gain_to_split: 0.5
  lambda_l1: 2.0
  lambda_l2: 10.0
  feature_fraction: 0.55
  bagging_fraction: 0.6
  bagging_freq: 1
  seed: 42
num_boost_round: 2000
early_stopping_rounds: 100
eval_log_path: logs/experiment_3m_eval_curve.csv
