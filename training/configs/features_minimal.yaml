# Minimal features configuration
# Only: cosine_sim, pop_store, kiosk_product_cnt, cand_is_new_for_kiosk, channels, regions

include_product_features: false          # Do NOT add product features
include_kiosk_features: true             # YES: kiosk_product_cnt
include_behavioral_features: true        # YES: pop_store, anchor_kiosk_frequency
include_personalization_features: true   # YES: cand_is_new_for_kiosk
include_popularity_features: false       # Do NOT add popularity features
encode_channel: true                     # YES: channel_* one-hot
encode_region: true                      # YES: region_* one-hot
