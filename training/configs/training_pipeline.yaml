raw_paths:
  - training/data/raw/2024-20250000_part_00-003.csv
n_rows: 1000000
sample_position: tail
interim_path: training/data/interim/orders_sample.parquet
products_path: training/data/external/products_v2.csv
commerces_path: training/data/external/commerces.csv
model_path: training/models/lgbm_ranker.txt
train_ratio: 0.7
val_ratio: 0.1
test_ratio: 0.2
test_eval_ratio: 0.5
min_cooc: 2
min_lift: 1.2
top_k: 50
label_window_days: 3
min_cooc_label: 1
max_neg_per_group: 0
eval_ks: [5, 10, 20, 50]
eval_extra_neg_per_query: 0
features_config_path: training/configs/features.yaml
candidate_generator: hybrid_mba_kiosk  # mba | hybrid | item2vec | hybrid_mba_kiosk
hybrid_pop_top_k_global: 50
hybrid_pop_top_k_category: 50
item2vec_embedding_dim: 64
item2vec_svd_n_iter: 10
item2vec_random_state: 42
hybrid_mba_kiosk_share: 0.5
hybrid_mba_kiosk_batch_size: 100
lgbm_params:
  learning_rate: 0.03
  num_leaves: 31
  max_depth: 8
  min_data_in_leaf: 200
  min_gain_to_split: 0.1
  lambda_l1: 0.0
  lambda_l2: 1.0
  feature_fraction: 0.7
  bagging_fraction: 0.7
  bagging_freq: 1
  seed: 42
num_boost_round: 2000
early_stopping_rounds: 100
eval_log_path: logs/training_eval_curve.csv
