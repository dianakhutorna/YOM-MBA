raw_paths:
  - training/data/raw/2024-20250000_part_00-003.csv
n_rows: 1000000
sample_position: tail
interim_path: training/data/interim/orders_sample.parquet
products_path: training/data/external/products_v2.csv
commerces_path: training/data/external/commerces.csv
model_path: training/models/lgbm_ranker.txt
train_ratio: 0.6
val_ratio: 0.2
test_ratio: 0.2
train_label_ratio: 0.3   # last 30% of training period used for labels (prevents feature/label leakage)
min_cooc: 2
min_lift: 1.2
top_k: 100
top_k_train: 100
label_window_days: 7
min_cooc_label: 1
label_kiosk_batch_size: 0  # <=0 means auto
max_neg_per_group: 20
max_eval_queries: 50000   # sample test queries to limit memory; 0 = use all
eval_ks: [5, 10, 20, 50]
predict_batch_size: 200000
lgbm_params:
  learning_rate: 0.02
  num_leaves: 15
  max_depth: 5
  min_data_in_leaf: 1000
  min_gain_to_split: 0.5
  lambda_l1: 2.0
  lambda_l2: 10.0
  feature_fraction: 0.55
  bagging_fraction: 0.6
  bagging_freq: 1
  seed: 42
num_boost_round: 2000
early_stopping_rounds: 100
eval_log_path: logs/training_eval_curve.csv
